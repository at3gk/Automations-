# sender-map.yml — SINGLE SOURCE OF TRUTH for sender -> category mapping.
# Drives both the `inbox-triage` skill's classification AND generate/build_filters.py.
#
# Schema:
#   categories:
#     "<label from taxonomy.yml>":
#       from:    [ matchers ]   # bare domain (chewy.com) matches any address/subdomain at that
#                               # domain; a full address (a@b.com) matches exactly.
#       subject: [ strings ]    # optional subject substring matchers (lower precedence than from)
#
# Every label used here MUST exist in taxonomy.yml (validate_config.py enforces this).
version: 1
