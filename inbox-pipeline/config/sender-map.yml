  # Transactional order/payment mail from overloaded senders (e.g. Amazon) — routed by SUBJECT,
  # kept VISIBLE (archive:false in taxonomy). Sender (from) matches always win over these, so
  # domain-mapped retailers like chewy.com still go to their own category, not here.
  "Shopping & Deals/Orders":
    subject: ["Ordered:", "Shipped:", "Delivered:", "Subscribe & Save",
              "We have processed your payment", "Amazon Pay"]
  # CapWeb business mail — labeled, kept in inbox, consumed by .claude/skills/capweb-reconcile
  "Arjun Capweb":
    from: [capitalwebmasters.com, csznet.com]
