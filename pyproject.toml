# Tooling config for the Personal Automations Kit's Python code.
# This is NOT a packaged library — scripts run directly (python <file>.py).
# It exists to centralize linter/test settings for the CapWeb + generator code.

[tool.ruff]
target-version = "py311"
line-length = 100
# Only the hand-written Python lives in these trees; nothing generated.
include = ["inbox-pipeline/**/*.py"]
extend-exclude = ["**/__pycache__"]

[tool.ruff.lint]
# pycodestyle errors (E), pyflakes (F), isort (I), bugbear (B), pyupgrade (UP).
select = ["E", "F", "I", "B", "UP"]

[tool.pytest.ini_options]
# Discover the capweb tests; they also still run as bare `python` scripts.
testpaths = ["inbox-pipeline/capweb/tests"]
python_files = ["test_*.py"]
